<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces">

<h:head>
    <title>Enterprise Task Manager</title>
</h:head>

<h:body style="background-color: #f8f9fa; padding: 2rem; font-family: Arial, sans-serif;">

    <h:form id="taskForm">
        <p:card style="width: 50rem; margin: 0 auto;">
        <p:panel header="Current To-Do List">

            <div class="ui-fluid" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <p:inputText value="#{taskBackingBean.newTask}" placeholder="Enter new task" />

            <p:commandButton value="Add Task"
                             action="#{taskBackingBean.addTask}"
                             update="taskList @form" />
            </div>

            <p:dataTable id="taskList" value="#{taskBackingBean.tasks}" var="task">
                <p:column headerText="Task Name">
                    <i class="pi pi-check-circle" style="color: #28a745; margin-right: 8px;"></i>
                    <h:outputText value="#{task}" />
                </p:column>
            </p:dataTable>

        </p:panel>
        </p:card>
    </h:form>
</h:body>
</html>
