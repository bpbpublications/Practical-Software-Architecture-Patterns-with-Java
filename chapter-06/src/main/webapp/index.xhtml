<html xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)"
      xmlns:h="[http://xmlns.jcp.org/jsf/html](http://xmlns.jcp.org/jsf/html)"
      xmlns:p="[http://primefaces.org/ui](http://primefaces.org/ui)">
<h:head>
    <title>Live Stock Dashboard</title>
    <script type="text/javascript">
        let socket;

        function connectWebSocket() {
            // Grab the user input from the PrimeFaces text field
            const ticker = document.getElementById("tickerForm:tickerInput").value;
            if (!ticker) return;

            if (socket !== undefined) {
                socket.close(); // Clean up existing connections
            }

            // Establish the WebSocket handshake (Upgrade from HTTP to WS)
            const wsUrl = "ws://" + window.location.host + "/ws/stocks/" + ticker;
            socket = new WebSocket(wsUrl);

            socket.onopen = function(event) {
                document.getElementById("liveDataDisplay").innerHTML =
                    "<p style='color: green;'><i>Connected to " + ticker + " live stream...</i></p>";
            };

            // This fires asynchronously every time the ServerEndpoint calls sendText()
            socket.onmessage = function(event) {
                const display = document.getElementById("liveDataDisplay");
                // Prepend the newest data to the UI without refreshing the page!
                display.innerHTML = "<p><b>" + new Date().toLocaleTimeString() + ":</b> "
                    + event.data + "</p>" + display.innerHTML;
            };
        }
    </script>
</h:head>
<h:body style="font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 2rem;">
    <h:form id="tickerForm">
        <p:card style="width: 40rem; margin: 0 auto;">
            <h2><i class="pi pi-chart-line" style="margin-right: 10px;"></i> Real-Time Stock Dashboard</h2>
            <p:divider />

            <div class="ui-fluid" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <p:inputText id="tickerInput" placeholder="Enter Ticker (e.g., AAPL)" style="flex-grow: 1;" />
                <p:commandButton value="Connect Stream" type="button" icon="pi pi-bolt"
                                 onclick="connectWebSocket()" styleClass="ui-button-warning" />
            </div>

            <!-- Output container for the streaming WebSocket frames -->
            <div id="liveDataDisplay" style="height: 200px; overflow-y: auto; background: #2b2b2b; color: #a9b7c6; padding: 15px; border-radius: 5px; font-family: monospace;">
                <p style="color: #808080;">Awaiting connection...</p>
            </div>
        </p:card>
    </h:form>
</h:body>
</html>
